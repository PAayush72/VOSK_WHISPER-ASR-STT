<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Live Speech to Text</title>

<style>
body {
    background: #020617;
    font-family: Arial, sans-serif;
    color: #e5e7eb;
}

.container {
    max-width: 700px;
    margin: 40px auto;
    padding: 20px;
    background: #020617;
    border: 1px solid #1e293b;
    border-radius: 10px;
}

h1 {
    text-align: center;
}

.status {
    text-align: center;
    margin-bottom: 15px;
    color: #38bdf8;
}

.box {
    border: 1px solid #1e293b;
    border-radius: 8px;
    padding: 15px;
    margin-bottom: 15px;
}

.live {
    font-size: 18px;
    color: #facc15;
}

.final p {
    margin: 5px 0;
    color: #22c55e;
}

.buttons {
    display: flex;
    justify-content: center;
    gap: 20px;
}

button {
    padding: 10px 25px;
    font-size: 16px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.start {
    background: #22c55e;
}

.stop {
    background: #ef4444;
    color: white;
}
</style>
</head>

<body>

<div class="container">
    <h1>🎙 Live Speech to Text</h1>

    <div class="status" id="status">Status: Idle</div>

    <div class="box">
        <strong>Live Speech</strong>
        <div class="live" id="liveText">Waiting...</div>
    </div>

    <div class="box final">
        <strong>Final Transcription</strong>
        <div id="finalText"></div>
    </div>

    <div class="buttons">
        <button class="start" onclick="start()">Start</button>
        <button class="stop" onclick="stop()">Stop</button>
    </div>
</div>

<script>
let ws = null;

function start() {
    document.getElementById("status").innerText = "Status: Connecting...";

    ws = new WebSocket("ws://localhost:8765");

    ws.onopen = () => {
        document.getElementById("status").innerText = "Status: Listening 🎤";
    };

    ws.onmessage = (event) => {
        const data = JSON.parse(event.data);

        if (data.type === "partial") {
            document.getElementById("liveText").innerText = data.text;
        }

        if (data.type === "final") {
            const p = document.createElement("p");
            p.innerText = data.text;
            document.getElementById("finalText").appendChild(p);
            document.getElementById("liveText").innerText = "";
        }
    };

    ws.onclose = () => {
        document.getElementById("status").innerText = "Status: Stopped";
    };

    ws.onerror = () => {
        document.getElementById("status").innerText = "Status: Connection Error";
    };
}

function stop() {
    if (ws) {
        ws.close();
        ws = null;
    }
}
</script>

</body>
</html>
